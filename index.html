<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lift Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #111213;
    --surface: #1a1b1d;
    --card:    #222326;
    --border:  #2e2f33;
    --accent:  #FFD23F;
    --green:   #4ADE80;
    --red:     #F87171;
    --blue:    #60A5FA;
    --text:    #F1F1F1;
    --muted:   #666870;
    --display: 'Barlow Condensed', sans-serif;
    --body:    'Barlow', sans-serif;
    --radius:  14px;
    --bottom-safe: env(safe-area-inset-bottom, 16px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--body); font-size: 16px; overscroll-behavior: none; }
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; }

  header { padding: 52px 20px 16px; background: var(--bg); flex-shrink: 0; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-end; }
  .brand { font-family: var(--display); font-size: 38px; font-weight: 800; letter-spacing: 2px; color: var(--accent); line-height: 1; }
  .date-chip { font-size: 12px; color: var(--muted); font-weight: 500; background: var(--surface); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); }

  .tabs { display: flex; padding: 12px 20px 0; gap: 6px; flex-shrink: 0; }
  .tab { flex: 1; padding: 10px 4px; border: none; border-radius: 10px; background: var(--surface); color: var(--muted); font-family: var(--display); font-size: 14px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .tab.active { background: var(--accent); color: #111; border-color: var(--accent); }

  .content { flex: 1; overflow-y: auto; padding: 16px 20px calc(var(--bottom-safe) + 16px); -webkit-overflow-scrolling: touch; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .card-label { font-family: var(--display); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  input, select, textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; color: var(--text); font-family: var(--body); font-size: 16px; appearance: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: none; min-height: 80px; }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }

  .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius); font-family: var(--display); font-size: 18px; font-weight: 800; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:active { opacity: 0.8; transform: scale(0.98); }
  .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); font-size: 14px; padding: 12px; }
  .btn-danger { background: none; border: 1px solid #f8717133; color: var(--red); font-size: 12px; padding: 8px 14px; width: auto; border-radius: 8px; }
  .btn-save { margin-top: 8px; }

  .exercise-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .ex-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ex-header input { flex: 1; padding: 10px 12px; font-size: 15px; }

  .sets-head, .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; align-items: center; }
  .sets-head span { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; text-align: center; }
  .set-num { font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--muted); text-align: center; }
  .set-row input { padding: 10px 8px; font-size: 15px; text-align: center; border-radius: 8px; }

  .add-set-btn { width: 100%; padding: 10px; background: none; border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); font-family: var(--body); font-size: 13px; cursor: pointer; margin-top: 4px; transition: all 0.15s; }
  .add-set-btn:active { background: var(--card); }

  .rpe-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .rpe-btn { padding: 14px 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: var(--display); font-size: 18px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.12s; }
  .rpe-btn.selected { background: var(--accent); color: #111; border-color: var(--accent); }

  .session-grid { display: flex; flex-direction: column; gap: 8px; }
  .session-pill { padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--muted); font-family: var(--body); font-size: 14px; font-weight: 500; cursor: pointer; text-align: left; transition: all 0.12s; display: flex; align-items: center; gap: 10px; }
  .session-pill .pill-icon { font-size: 18px; }
  .session-pill.selected { background: #FFD23F18; border-color: var(--accent); color: var(--text); }

  .toast { position: fixed; bottom: calc(var(--bottom-safe) + 24px); left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: #111; font-family: var(--display); font-size: 15px; font-weight: 700; letter-spacing: 0.5px; padding: 14px 28px; border-radius: 40px; opacity: 0; transition: all 0.25s cubic-bezier(.4,0,.2,1); z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.error { background: var(--red); color: #fff; }

  .entry { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
  .entry-date { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .entry-title { font-family: var(--display); font-size: 20px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); line-height: 1.1; }
  .entry-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-size: 14px; }

  .section-label { font-family: var(--display); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 20px 0 10px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  /* Food search */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-results { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-top: 6px; max-height: 280px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .search-result { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .search-result:last-child { border-bottom: none; }
  .search-result:active { background: var(--card); }
  .search-result-info { flex: 1; min-width: 0; }
  .search-result-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .search-result-sub { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .source-pill { font-size: 9px; padding: 2px 6px; border-radius: 8px; background: var(--card); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-left: 4px; font-weight: 700; }
  .source-pill.local { background: #FFD23F25; color: var(--accent); }

  .item-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-macros { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .item-grams { width: 70px; padding: 8px 10px; font-size: 14px; text-align: center; border-radius: 8px; }
  .item-remove { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 8px; }

  .macros-summary { background: linear-gradient(135deg, #FFD23F18, #FFD23F08); border: 1px solid #FFD23F40; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .macro-stat { text-align: center; }
  .macro-val { font-family: var(--display); font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
  .macro-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

  .template-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.12s; }
  .template-pill:active { background: var(--card); }
  .template-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .template-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .card, .entry, .item-row, .search-results { animation: fadeUp 0.2s ease; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="header-top">
      <div class="brand">LIFT LOG</div>
      <div class="date-chip" id="date-chip"></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('workout')">Workout</button>
    <button class="tab" onclick="showTab('meal')">Meal</button>
    <button class="tab" onclick="showTab('weight')">Weight</button>
  </div>

  <div class="content">

    <!-- WORKOUT -->
    <div id="tab-workout">
      <div class="card" style="margin-top:16px">
        <div class="card-label">Session type</div>
        <div class="session-grid">
          <button class="session-pill selected" onclick="selectSession(this, 'Upper')"><span class="pill-icon">💪</span> Upper</button>
          <button class="session-pill" onclick="selectSession(this, 'Lower')"><span class="pill-icon">🦵</span> Lower</button>
          <button class="session-pill" onclick="selectSession(this, 'Full')"><span class="pill-icon">🏋🏾‍♀️</span> Full body</button>
          <button class="session-pill" onclick="selectSession(this, 'Cardio')"><span class="pill-icon">🫀</span> Cardio</button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">Details</div>
        <div class="row">
          <div class="field"><label>Duration (min)</label><input type="number" id="wo-dur" placeholder="60" inputmode="numeric"></div>
          <div class="field"><label>Date</label><input type="date" id="wo-date"></div>
        </div>
        <div class="field"><label>Notes</label><textarea id="wo-notes" placeholder="New PB, how you felt..."></textarea></div>
      </div>
      <div class="card">
        <div class="card-label">RPE</div>
        <div class="rpe-grid">
          <button class="rpe-btn" onclick="selectRpe(this, 6)">6</button>
          <button class="rpe-btn" onclick="selectRpe(this, 7)">7</button>
          <button class="rpe-btn selected" onclick="selectRpe(this, 8)">8</button>
          <button class="rpe-btn" onclick="selectRpe(this, 9)">9</button>
          <button class="rpe-btn" onclick="selectRpe(this, 10)">10</button>
        </div>
      </div>
      <div class="section-label">Exercises</div>
      <div id="ex-container"></div>
      <button class="btn btn-ghost" onclick="addExercise()" style="margin-bottom:12px">+ Add exercise</button>
      <button class="btn btn-primary btn-save" onclick="saveWorkout()">Save workout</button>
    </div>

    <!-- MEAL -->
    <div id="tab-meal" style="display:none">
      <div class="card" style="margin-top:16px">
        <div class="card-label">Meal details</div>
        <div class="row">
          <div class="field">
            <label>Type</label>
            <select id="m-type">
              <option>Breakfast</option><option>Mid-morning snack</option><option>Lunch</option>
              <option>Pre-workout</option><option>Dinner</option><option>Other</option>
            </select>
          </div>
          <div class="field"><label>Date</label><input type="date" id="m-date"></div>
        </div>
        <div class="field"><label>Description (optional)</label><input type="text" id="m-desc" placeholder="e.g. Post-gym lunch"></div>
      </div>

      <div class="card">
        <div class="card-label">Foods</div>
        <div id="manual-items"></div>
        <button class="btn btn-ghost" onclick="addManualFood()" style="margin-top:8px">+ Add food</button>

        <div class="macros-summary" id="macros-summary" style="display:none">
          <div class="macro-stat"><div class="macro-val" id="m-tot-kcal">0</div><div class="macro-label">kcal</div></div>
          <div class="macro-stat"><div class="macro-val" id="m-tot-prot">0</div><div class="macro-label">protein</div></div>
          <div class="macro-stat"><div class="macro-val" id="m-tot-carbs">0</div><div class="macro-label">carbs</div></div>
          <div class="macro-stat"><div class="macro-val" id="m-tot-fat">0</div><div class="macro-label">fat</div></div>
        </div>
      </div>

      <button class="btn btn-primary btn-save" onclick="saveMeal()">Save meal</button>
    </div>

    <!-- WEIGHT -->
    <div id="tab-weight" style="display:none">
      <div class="card" style="margin-top:16px">
        <div class="card-label">Today's weigh-in</div>
        <div class="field"><label>Weight (kg)</label><input type="number" id="wt-kg" placeholder="83.0" step="0.1" inputmode="decimal" style="font-size:32px;font-family:var(--display);font-weight:700;text-align:center;padding:20px;"></div>
        <div class="row">
          <div class="field"><label>Waist (cm)</label><input type="number" id="wt-waist" placeholder="—" step="0.1" inputmode="decimal"></div>
          <div class="field"><label>Date</label><input type="date" id="wt-date"></div>
        </div>
        <div class="field"><label>Notes</label><input type="text" id="wt-notes" placeholder="Morning fasted"></div>
      </div>
      <button class="btn btn-primary btn-save" onclick="saveWeight()">Save weight</button>
    </div>

    <!-- FOODS LIBRARY (offline view) — REMOVED, manual entry only -->


  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config — offline mode ──
const today = new Date().toISOString().split('T')[0];
let selectedSession = 'Upper';
let selectedRpe = 8;
let exCount = 0;
let manualFoods = [];

function downloadJSON(data, type) {
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filename = `liftlog_${type}_${timestamp}.json`;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

document.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  document.getElementById('date-chip').textContent = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  ['wo-date', 'm-date', 'wt-date'].forEach(id => document.getElementById(id).value = today);
});

function showTab(name) {
  ['workout','meal','weight'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['workout','meal','weight'][i] === name);
  });
}

function selectSession(el, value) {
  document.querySelectorAll('.session-pill').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected'); selectedSession = value;
}
function selectRpe(el, value) {
  document.querySelectorAll('.rpe-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected'); selectedRpe = value;
}

function toast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// (No API helper — this is offline mode. Files download as JSON for AirDrop)

// ── Workout ──
function addExercise() {
  exCount++;
  const id = exCount;
  const div = document.createElement('div');
  div.className = 'exercise-block';
  div.id = 'ex-' + id;
  div.innerHTML = `
    <div class="ex-header">
      <input type="text" placeholder="Exercise name" id="ex-name-${id}">
      <button class="btn btn-danger" onclick="document.getElementById('ex-${id}').remove()">✕</button>
    </div>
    <div class="sets-head"><span>#</span><span>Reps</span><span>kg</span><span>Notes</span></div>
    <div id="ex-rows-${id}"></div>
    <button class="add-set-btn" onclick="addSet(${id})">+ Add set</button>`;
  document.getElementById('ex-container').appendChild(div);
  addSet(id);
  setTimeout(() => div.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function addSet(exId) {
  const container = document.getElementById('ex-rows-' + exId);
  const num = container.children.length + 1;
  const div = document.createElement('div');
  div.className = 'set-row';
  div.innerHTML = `<div class="set-num">${num}</div><input type="number" placeholder="10" inputmode="numeric"><input type="number" placeholder="0" step="0.5" inputmode="decimal"><input type="text" placeholder="—">`;
  container.appendChild(div);
}

function saveWorkout() {
  const sets = [];
  document.querySelectorAll('.exercise-block').forEach(block => {
    const id = block.id.replace('ex-', '');
    const name = document.getElementById('ex-name-' + id)?.value?.trim();
    if (!name) return;
    block.querySelectorAll('.set-row').forEach((row, i) => {
      const inputs = row.querySelectorAll('input');
      sets.push({
        exercise: name, set_number: i + 1,
        reps: parseInt(inputs[0].value) || null,
        weight_kg: parseFloat(inputs[1].value) || null,
        notes: inputs[2].value || null,
      });
    });
  });
  const data = {
    type: 'workout',
    log_date: document.getElementById('wo-date').value,
    session_type: selectedSession,
    duration_min: parseInt(document.getElementById('wo-dur').value) || null,
    rpe: selectedRpe,
    notes: document.getElementById('wo-notes').value || null,
    sets,
  };
  downloadJSON(data, 'workout');
  toast('Downloaded — AirDrop to Mac ✓');
  document.getElementById('ex-container').innerHTML = '';
  document.getElementById('wo-notes').value = '';
  document.getElementById('wo-dur').value = '';
  exCount = 0;
}

// ── Meal: manual food entry ──
function addManualFood() {
  manualFoods.push({
    name: '', grams: 100,
    calories: '', protein: '', carbs: '', fat: ''
  });
  renderManualFoods();
}

function removeManualFood(idx) {
  manualFoods.splice(idx, 1);
  renderManualFoods();
}

function updateManualField(idx, field, value) {
  if (field === 'name') {
    manualFoods[idx].name = value;
  } else {
    manualFoods[idx][field] = parseFloat(value) || 0;
    renderMacroTotals();
  }
}

function renderManualFoods() {
  const el = document.getElementById('manual-items');
  if (!manualFoods.length) {
    el.innerHTML = '';
    document.getElementById('macros-summary').style.display = 'none';
    return;
  }
  el.innerHTML = manualFoods.map((f, idx) => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input type="text" placeholder="Food name (e.g. Chicken breast)" value="${f.name}"
               onchange="updateManualField(${idx}, 'name', this.value)"
               style="flex:1;padding:10px 12px;font-size:14px">
        <button class="item-remove" onclick="removeManualFood(${idx})">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" placeholder="100" value="${f.grams || ''}" min="0" step="1" inputmode="decimal"
                 onchange="updateManualField(${idx}, 'grams', this.value)"
                 style="padding:8px;font-size:13px;text-align:center">
          <span style="font-size:11px;color:var(--muted)">g</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" placeholder="kcal" value="${f.calories || ''}" min="0" inputmode="numeric"
                 onchange="updateManualField(${idx}, 'calories', this.value)"
                 style="padding:8px;font-size:13px;text-align:center">
          <span style="font-size:11px;color:var(--muted)">kcal</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" placeholder="protein" value="${f.protein || ''}" min="0" step="0.1" inputmode="decimal"
                 onchange="updateManualField(${idx}, 'protein', this.value)"
                 style="padding:8px;font-size:13px;text-align:center">
          <span style="font-size:11px;color:var(--muted)">P</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" placeholder="carbs" value="${f.carbs || ''}" min="0" step="0.1" inputmode="decimal"
                 onchange="updateManualField(${idx}, 'carbs', this.value)"
                 style="padding:8px;font-size:13px;text-align:center">
          <span style="font-size:11px;color:var(--muted)">C</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" placeholder="fat" value="${f.fat || ''}" min="0" step="0.1" inputmode="decimal"
                 onchange="updateManualField(${idx}, 'fat', this.value)"
                 style="padding:8px;font-size:13px;text-align:center">
          <span style="font-size:11px;color:var(--muted)">F</span>
        </div>
      </div>
    </div>`).join('');
  renderMacroTotals();
}

function renderMacroTotals() {
  let kcal = 0, prot = 0, carbs = 0, fat = 0;
  manualFoods.forEach(f => {
    kcal  += parseFloat(f.calories) || 0;
    prot  += parseFloat(f.protein)  || 0;
    carbs += parseFloat(f.carbs)    || 0;
    fat   += parseFloat(f.fat)      || 0;
  });
  document.getElementById('m-tot-kcal').textContent  = Math.round(kcal);
  document.getElementById('m-tot-prot').textContent  = prot.toFixed(1);
  document.getElementById('m-tot-carbs').textContent = carbs.toFixed(1);
  document.getElementById('m-tot-fat').textContent   = fat.toFixed(1);
  document.getElementById('macros-summary').style.display = 'grid';
}

function saveMeal() {
  const validFoods = manualFoods.filter(f => f.name && f.name.trim());
  if (!validFoods.length) { toast('Add at least one food with a name', true); return; }

  // Total macros from all foods
  let kcal = 0, prot = 0, carbs = 0, fat = 0;
  validFoods.forEach(f => {
    kcal  += parseFloat(f.calories) || 0;
    prot  += parseFloat(f.protein)  || 0;
    carbs += parseFloat(f.carbs)    || 0;
    fat   += parseFloat(f.fat)      || 0;
  });

  const data = {
    type: 'meal',
    log_date: document.getElementById('m-date').value,
    meal_type: document.getElementById('m-type').value,
    description: document.getElementById('m-desc').value || validFoods.map(f => f.name).join(' + '),
    calories: Math.round(kcal),
    protein_g: +prot.toFixed(1),
    carbs_g: +carbs.toFixed(1),
    fat_g: +fat.toFixed(1),
    fibre_g: 0,
    items: validFoods.map(f => ({
      name: f.name,
      grams: parseFloat(f.grams) || 100,
      calories: parseFloat(f.calories) || 0,
      protein_g: parseFloat(f.protein) || 0,
      carbs_g: parseFloat(f.carbs) || 0,
      fat_g: parseFloat(f.fat) || 0,
    })),
  };

  downloadJSON(data, 'meal');
  toast('Downloaded — AirDrop to Mac ✓');
  manualFoods = [];
  document.getElementById('m-desc').value = '';
  renderManualFoods();
}

// ── Weight ──
function saveWeight() {
  const kg = parseFloat(document.getElementById('wt-kg').value);
  if (!kg) { toast('Enter a weight', true); return; }
  const data = {
    type: 'weight',
    log_date: document.getElementById('wt-date').value,
    weight_kg: kg,
    waist_cm: parseFloat(document.getElementById('wt-waist').value) || null,
    notes: document.getElementById('wt-notes').value || null,
  };
  downloadJSON(data, 'weight');
  toast('Downloaded — AirDrop to Mac ✓');
  document.getElementById('wt-kg').value = '';
  document.getElementById('wt-waist').value = '';
  document.getElementById('wt-notes').value = '';
}

// ── Session pills update ──
// Default session is now 'Upper' (simpler categories)
</script>
</body>
</html>
